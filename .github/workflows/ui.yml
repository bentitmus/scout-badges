name: ui

on:
  push:
    branches: [main]
    paths:
      - src/ui/**
  pull_request:
    branches: [main]
    paths:
      - src/ui/**

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ui
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v5
      - name: 🚚 Install mise-en-place
        uses: jdx/mise-action@v3
        with:
          experimental: true
      - name: 🕵️ Run lint
        run: mise run lint

  test-spec:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ui
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v5
      - name: 🚚 Install mise-en-place
        uses: jdx/mise-action@v3
        with:
          experimental: true
      - name: 🎭 Install Playwright Browsers
        run: mise exec -- pnpm playwright install --with-deps
      - name: 🥒 Run specification tests
        run: mise run test-spec

