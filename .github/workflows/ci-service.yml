name: CI (service)

on:
  push:
    branches: [main]
    paths:
      - features/service/**
      - src/service/**
  pull_request:
    branches: [main]
    paths:
      - features/service/**
      - src/service/**

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v6
      - name: 🚚 Install mise-en-place
        uses: jdx/mise-action@v4
        with:
          experimental: true
      - name: 🕵️ Run lint
        run: |
          mise run //features:lint
          mise run //src/service:lint

  test-spec:
    name: Test specifications
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v6
      - name: 🚚 Install mise-en-place
        uses: jdx/mise-action@v4
        with:
          experimental: true
      - name: 🥒 Run specification tests
        run: mise run //src/service:test-spec

