name: CI (database)

on:
  push:
    branches: [main]
    paths:
      - src/database/**
  pull_request:
    branches: [main]
    paths:
      - src/database/**

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v6
      - name: 📦 Install Postgres dependencies
        run: sudo apt-get install libreadline-dev uuid-dev
      - name: 🚚 Install mise-en-place
        uses: jdx/mise-action@v4
        with:
          experimental: true
      - name: 🕵️ Run lint
        run: mise run //src/database:lint

