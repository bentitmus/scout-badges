name: Deploy to AWS S3
 
on:
  push:
    branches:
      - database
 
permissions:
  id-token: write
  contents: read
 
jobs:
  plan:
    name: Terraform Plan Job
    runs-on: ubuntu-latest
    outputs:
      output1: ${{ steps.artifact-upload-step.outputs.artifact-id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-west-2
 
      - name: Verify AWS identity
        run: aws sts get-caller-identity
      
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          cd infra
          terraform init -backend-config="./vars/dev/backend.hcl"
      
      - name: Terraform Plan
        run: |
          cd infra
          terraform plan -var-file="./vars/dev/vars.tf" -out="./infra-plan.tfplan"
      
      - name: Publish artifact
        id: artifact-upload-step
        uses: actions/upload-artifact@v7
        with:
          name: infra-plan
          path: ./infra/infra-plan.tfplan
          retention-days: 5

  apply:
    name: Terraform Apply Job
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-west-2
 
      - name: Verify AWS identity
        run: aws sts get-caller-identity
      
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          cd infra
          terraform init -backend-config="./vars/dev/backend.hcl"
      
      - env:
          OUTPUT1: ${{needs.plan.outputs.output1}}
        run: echo "Artifact ID from previous job is $OUTPUT1"
      
      - uses: actions/download-artifact@v8
        with:
          artifact-ids: $OUTPUT1
      
      - name: Read downloaded plan
        run: | 
          ls -R


      



 
