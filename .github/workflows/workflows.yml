name: workflows

on:
  push:
    branches: [main]
    paths:
      - .github/**
  pull_request:
    branches: [main]
    paths:
      - .github/**

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v5
      - name: 🚚 Install mise-en-place
        uses: jdx/mise-action@v3
        with:
          experimental: true
      - name: 🕵️ Run lint
        run: |
          mise run //.github:lint

