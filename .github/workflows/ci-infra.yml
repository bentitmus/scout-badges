name: CI (infrastructure)

on:
  push:
    branches: [main]
    paths:
      - infra/**
  pull_request:
    branches: [main]
    paths:
      - infra/**

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v6
      - name: 🚚 Install mise-en-place
        uses: jdx/mise-action@v4
        with:
          experimental: true
      - name: 🕵️ Run lint
        run: mise run //infra:lint

